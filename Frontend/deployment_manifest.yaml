deployment:
  app_name: "TLS-Spec-Validation-UI"
  target_repo: "FileOS-HASM/TLS-Spec-Validation-UI"
  infrastructure: "VPS (Hostinger srv1) + Nginx Docker"
  routing:
    domain: "tls-spec.fileos.cloud"
    internal_port: 80
  
sync_bridge:
  method: "Dropbox Active Folder Sync"
