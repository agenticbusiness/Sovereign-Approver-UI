server {
    listen 80;
    server_name tls-spec.fileos.cloud;

    # Root directory for the static payload synced via Dropbox
    root /usr/share/nginx/html/tls_spec;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.html;
        
        # CORS headers for API calls if required
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
    }

    # Deny access to hidden files (e.g. .git, .env)
    location ~ /\. {
        deny all;
    }
}
